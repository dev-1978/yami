<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FICHITAS VIP 👑</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:'Montserrat',sans-serif;
color:#fff;
text-align:center;
overflow:hidden;
background:#000;

-webkit-user-select:none;
user-select:none;
-webkit-tap-highlight-color:transparent;
}

/* VIDEO */
.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.85));
z-index:-1;
}

.container{
max-width:420px;
margin:0 auto;
padding:110px 20px 60px;
position:relative;
z-index:2;
}

h1{
font-family:'Cinzel',serif;
font-size:2.6rem;
letter-spacing:6px;
color:#e6c76a;
margin-bottom:10px;
}

.subtitle{
letter-spacing:4px;
margin-bottom:30px;
opacity:.9;
}

.text{
line-height:1.6;
margin-bottom:35px;
}

.age{
font-size:.8rem;
letter-spacing:2px;
margin-bottom:35px;
opacity:.7;
}

.main-btn{
display:inline-block;
padding:16px 22px;
border-radius:14px;
text-decoration:none;
font-family:'Cinzel',serif;
letter-spacing:2px;
font-size:.9rem;
color:#fff;
background:rgba(0,0,0,.6);
border:1.5px solid #e6c76a;
box-shadow:0 10px 25px rgba(0,0,0,.7);
transition:.25s;
}

.main-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(230,199,106,.6);
}

.footer{
margin-top:50px;
font-size:.7rem;
opacity:.6;
}

/* JOKER */
.joker{
position:fixed;
pointer-events:none;
z-index:9999;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="container">

<h1>FICHITAS VIP</h1>
<div class="subtitle">ACCESO EXCLUSIVO</div>

<p class="text">
Entraste al lugar correcto.<br>
Atención directa y premios reales.
</p>

<div class="age">🔞 SOLO MAYORES DE 18 AÑOS</div>

<a class="main-btn"
href="https://wa.me/5491132592708?text=Hola%20Clau%20vengo%20de%20parte%20de%20Yamila%20quiero%20un%20usuario,%20mi%20nombre%20es%20:">
CELUAPUESTAS
</a>

<div class="footer">
JUGÁ RESPONSABLEMENTE
</div>

</div>

<script>
let maxTrail = 8;

document.addEventListener("touchmove", function(e){

let touch = e.touches[0];

let j = document.createElement("img");
j.src = "joker.png";
j.className = "joker";

let size = 70;
j.style.width = size + "px";
j.style.left = (touch.clientX - size/2) + "px";
j.style.top = (touch.clientY - size/2) + "px";
j.style.opacity = "1";

document.body.appendChild(j);

// animación de fade + shrink
setTimeout(()=>{
j.style.transition = "all 0.6s ease";
j.style.opacity = "0";
j.style.transform = "scale(0.6)";
},50);

// eliminar después
setTimeout(()=>{
j.remove();
},650);

// limitar cantidad visible
let jokers = document.querySelectorAll(".joker");
if(jokers.length > maxTrail){
jokers[0].remove();
}

});
</script>

</body>
</html>
