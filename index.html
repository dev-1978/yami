<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FICHITAS VIP 👑</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="joker.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:'Montserrat',sans-serif;
color:#fff;
text-align:center;
overflow:hidden;
background:#000;
}

/* VIDEO */
.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.85));
z-index:-1;
}

.container{
max-width:420px;
margin:0 auto;
padding:110px 20px 60px;
position:relative;
z-index:5;
}

h1{
font-family:'Cinzel',serif;
font-size:2.6rem;
letter-spacing:6px;
color:#e6c76a;
margin-bottom:10px;
}

.subtitle{
letter-spacing:4px;
margin-bottom:30px;
opacity:.9;
}

.text{
line-height:1.6;
margin-bottom:35px;
}

.age{
font-size:.8rem;
letter-spacing:2px;
margin-bottom:35px;
opacity:.7;
}

/* BOTÓN */
.main-btn{
display:inline-block;
padding:14px 30px;
border-radius:14px;
text-decoration:none;
font-family:'Cinzel',serif;
letter-spacing:2px;
font-size:.9rem;
color:#fff;
background:rgba(0,0,0,.6);
border:1.5px solid #e6c76a;
box-shadow:0 10px 25px rgba(0,0,0,.7);
transition:.25s;
}

.main-btn:hover{
transform:scale(1.05);
}

.footer{
margin-top:50px;
font-size:.7rem;
opacity:.6;
}

/* JOKER COMETA */
.joker{
position:fixed;
pointer-events:none;
z-index:3;
will-change:transform;
transition:transform 0.3s linear;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="container">

<h1>FICHITAS VIP</h1>
<div class="subtitle">ACCESO EXCLUSIVO</div>

<p class="text">
Entraste al lugar correcto.<br>
Atención directa y premios reales.
</p>

<div class="age">🔞 SOLO MAYORES DE 18 AÑOS</div>

<a class="main-btn"
href="https://wa.me/5491132592708?text=Hola%20Clau%20vengo%20de%20parte%20de%20Yamila,%20quiero%20un%20usuario,%20mi%20nombre%20es%20:">
CELUAPUESTAS
</a>

<div class="footer">
JUGÁ RESPONSABLEMENTE
</div>

</div>

<script>
const trailLength = 7;
const jokers = [];
const positions = [];

for(let i=0;i<trailLength;i++){
    const img = document.createElement("img");
    img.src = "joker.png";
    img.className = "joker";
    document.body.appendChild(img);
    jokers.push(img);
    positions.push({x:window.innerWidth/2,y:window.innerHeight/2});
}

document.addEventListener("mousemove", move);
document.addEventListener("touchmove", e => {
    move(e.touches[0]);
});

function move(e){
    positions[0] = {x:e.clientX,y:e.clientY};
}

function animate(){
    for(let i=1;i<trailLength;i++){
        positions[i].x += (positions[i-1].x - positions[i].x) * 0.15;
        positions[i].y += (positions[i-1].y - positions[i].y) * 0.15;
    }

    jokers.forEach((img,index)=>{
        let baseSize = 130;
        let size = baseSize - (index * 18);
        if(size < 35) size = 35;

        img.style.width = size + "px";
        img.style.transform =
        `translate(${positions[index].x - size/2}px, ${positions[index].y - size/2}px)`;
        img.style.opacity = 1 - (index * 0.12);
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
