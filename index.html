<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FICHITAS VIP 👑</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" sizes="32x32" href="joker.png">
<link rel="shortcut icon" href="joker.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:'Montserrat',sans-serif;
color:#fff;
text-align:center;
overflow:hidden;
background:#000;

-webkit-user-select:none;
user-select:none;
-webkit-tap-highlight-color:transparent;
}

/* VIDEO */
.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.85));
z-index:-1;
}

.container{
max-width:420px;
margin:0 auto;
padding:110px 20px 60px;
position:relative;
z-index:2;
}

/* TITULO CON JOKER */
.title-wrap{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

h1{
font-family:'Cinzel',serif;
font-size:2.6rem;
letter-spacing:6px;
color:#e6c76a;
}

.title-joker{
width:40px;
filter:drop-shadow(0 0 10px rgba(230,199,106,.6));
animation:floatJoker 3s ease-in-out infinite;
}

@keyframes floatJoker{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

.subtitle{
letter-spacing:4px;
margin:25px 0;
opacity:.9;
}

.text{
line-height:1.6;
margin-bottom:35px;
}

.age{
font-size:.8rem;
letter-spacing:2px;
margin-bottom:35px;
opacity:.7;
}

.main-btn{
display:inline-block;
padding:16px 22px;
border-radius:14px;
text-decoration:none;
font-family:'Cinzel',serif;
letter-spacing:2px;
font-size:.9rem;
color:#fff;
background:rgba(0,0,0,.6);
border:1.5px solid #e6c76a;
box-shadow:0 10px 25px rgba(0,0,0,.7);
transition:.25s;
}

.main-btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(230,199,106,.6);
}

.footer{
margin-top:50px;
font-size:.7rem;
opacity:.6;
}

/* JOKER COMETA */
.joker{
position:fixed;
pointer-events:none;
z-index:9999;
transition:all .6s ease;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="container">

<div class="title-wrap">
<h1>FICHITAS VIP</h1>
<img src="joker.png" class="title-joker">
</div>

<div class="subtitle">ACCESO EXCLUSIVO</div>

<p class="text">
Entraste al lugar correcto.<br>
Atención directa y premios reales.
</p>

<div class="age">🔞 SOLO MAYORES DE 18 AÑOS</div>

<a class="main-btn"
href="https://wa.me/5491132592708?text=Hola%20Clau%20vengo%20de%20parte%20de%20Yamila%20quiero%20un%20usuario,%20mi%20nombre%20es%20:">
CELUAPUESTAS
</a>

<div class="footer">
JUGÁ RESPONSABLEMENTE
</div>

</div>

<script>
let trail = [];
let maxTrail = 8;
let delay = 90;
let lastTime = 0;

function handleMove(x,y){
let now = Date.now();
if(now - lastTime < delay) return;
lastTime = now;

let j = document.createElement("img");
j.src = "joker.png";
j.className = "joker";

trail.unshift(j);
document.body.appendChild(j);

if(trail.length > maxTrail){
trail[trail.length - 1].remove();
trail.pop();
}

trail.forEach((joker, index)=>{
let baseSize = 110;
let size = baseSize - (index * 12);
if(size < 40) size = 40;

joker.style.width = size + "px";
joker.style.left = (x - size/2) + "px";
joker.style.top = (y - size/2) + "px";
joker.style.opacity = 1 - (index * 0.12);
});
}

document.addEventListener("touchmove", function(e){
let touch = e.touches[0];
handleMove(touch.clientX, touch.clientY);
});

document.addEventListener("mousemove", function(e){
handleMove(e.clientX, e.clientY);
});
</script>

</body>
</html>
