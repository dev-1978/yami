<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>FICHITAS VIP 👑</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
font-family:'Montserrat',sans-serif;
color:#fff;
text-align:center;
overflow:hidden;
background:#000;
}

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.85));
z-index:-1;
}

.container{
max-width:420px;
margin:0 auto;
padding:110px 20px 60px;
position:relative;
z-index:2;
}

h1{
font-family:'Cinzel',serif;
font-size:2.6rem;
letter-spacing:6px;
color:#e6c76a;
margin-bottom:10px;
}

.subtitle{
letter-spacing:4px;
margin-bottom:30px;
opacity:.9;
}

.text{
line-height:1.6;
margin-bottom:35px;
}

.age{
font-size:.8rem;
letter-spacing:2px;
margin-bottom:35px;
opacity:.7;
}

.buttons{
display:flex;
justify-content:center;
}

.main-btn{
max-width:200px;
position:relative;
overflow:hidden;
padding:14px 12px;
border-radius:14px;
text-decoration:none;
font-family:'Cinzel',serif;
letter-spacing:2px;
font-size:.85rem;
color:#fff;
background:rgba(0,0,0,.6);
border:1.5px solid #e6c76a;
box-shadow:0 10px 25px rgba(0,0,0,.7);
transition:.25s;
}

.main-btn:hover{
transform:scale(1.05);
}

/* FICHAS */
.chip{
position:fixed;
width:14px;
height:14px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%, #fff7c2, #e6c76a);
box-shadow:0 0 10px rgba(230,199,106,.8);
pointer-events:none;
z-index:9999;
animation:fall 1s ease-out forwards;
}

@keyframes fall{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(120px) scale(.6);opacity:0;}
}

.footer{
margin-top:50px;
font-size:.7rem;
opacity:.6;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="video.mp4" type="video/mp4">
</video>

<div class="container">

<h1>FICHITAS VIP</h1>
<div class="subtitle">ACCESO EXCLUSIVO</div>

<p class="text">
Entraste al lugar correcto.<br>
Atención directa y premios reales.
</p>

<div class="age">🔞 SOLO MAYORES DE 18 AÑOS</div>

<div class="buttons">

<a class="main-btn"
href="https://wa.me/5491132592708?text=Hola%20Clau%20vengo%20de%20parte%20de%20Yamila%20quiero%20un%20usuario,%20mi%20nombre%20es%20:"
onclick="dropChips(event)">
CELUAPUESTAS
</a>

</div>

<div class="footer">
JUGÁ RESPONSABLEMENTE
</div>

</div>

<script>
function dropChips(e){
const rect = e.target.getBoundingClientRect();
for(let i=0;i<8;i++){
let chip=document.createElement("div");
chip.className="chip";
chip.style.left=(rect.left+rect.width/2+(Math.random()*40-20))+"px";
chip.style.top=(rect.top+rect.height/2)+"px";
document.body.appendChild(chip);
setTimeout(()=>chip.remove(),1000);
}
}
</script>

</body>
</html>
